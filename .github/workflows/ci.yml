name: CI

on:
  pull_request:
  push:
    branches:
      - main

# Cancel in-progress runs for the same PR/branch when new commits arrive
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # No database is available in CI, so skip env validation at build time
  SKIP_ENV_VALIDATION: "1"

jobs:
  check:
    name: Lint & format (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm check

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm exec tsc --noEmit

  test:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          # No real services in CI; SKIP_ENV_VALIDATION (set at workflow level)
          # bypasses validation, and these placeholders keep module-load code
          # (auth/db clients) from tripping on undefined values during the build.
          # `pnpm build` runs db:deploy first, but scripts/db-deploy.sh only
          # applies migrations on Vercel (VERCEL env var, unset here), so the
          # placeholder DATABASE_URL below is never dialled.
          DATABASE_URL: "postgresql://user:pass@localhost:5432/build"
          BETTER_AUTH_SECRET: "ci-build-placeholder-secret-not-used-at-runtime"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"

  db-migration-check:
    name: DB migration check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify schema changes ship a migration
        run: bash scripts/check-migration-added.sh "origin/${{ github.event.pull_request.base.ref }}"

  # E2E tests (Playwright) are intentionally not run in CI — they are heavy
  # (browser downloads + a running dev server). Run them locally with `pnpm e2e`.
