name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    # Centralized, standardized CI shared across the template-derived repos.
    # See github.com/kornsour/gh-automation.
    uses: kornsour/gh-automation/.github/workflows/ci.yml@main
    with:
      migration-check: true
