name: E2E

on:
  pull_request:
    # `labeled` is included so adding the `run-e2e` label opts a feature PR into
    # a real E2E run (not a default pull_request activity type).
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: E2E (Playwright)
    # E2E is the safety net for UNATTENDED merges. Run it for real only on
    # Dependabot PRs (where no human is exercising the app), on a manual
    # dispatch, or when a human opts in with the `run-e2e` label. Ordinary
    # feature PRs skip it — you're testing those by hand (see ADR-0017).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.actor == 'dependabot[bot]' ||
      contains(github.event.pull_request.labels.*.name, 'run-e2e')
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Real env validation (not skipped): the app needs a valid DATABASE_URL +
      # BETTER_AUTH_SECRET, both provided here against the service container.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/app
      BETTER_AUTH_SECRET: e2e-placeholder-secret-not-used-in-prod
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply database migrations
        # Call drizzle-kit directly (not the db:migrate script) to skip its
        # dotenv wrapper — drizzle.config.ts reads process.env.DATABASE_URL, set
        # above. migrate (not push) is non-interactive and matches production.
        run: pnpm exec drizzle-kit migrate

      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright (browser + OS deps)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright OS deps only (cached browser)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run E2E tests
        run: pnpm e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Always-running gate so E2E can be a REQUIRED status check without blocking
  # ordinary feature PRs (where the e2e job is skipped). Passes when E2E
  # succeeded or was intentionally skipped; fails only when E2E actually failed.
  e2e-gate:
    name: E2E gate
    needs: [e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify E2E result
        run: |
          result="${{ needs.e2e.result }}"
          echo "E2E job result: $result"
          if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
            echo "❌ E2E failed — blocking merge."
            exit 1
          fi
          echo "✓ E2E gate satisfied ($result)."
