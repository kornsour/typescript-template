name: Provision Workspace domain

on:
  workflow_dispatch:
    inputs:
      command:
        description: "get-token, verify-add, add-only (skip verification), or status (check current state)"
        required: true
        type: choice
        options:
          - get-token
          - verify-add
          - add-only
          - status
      domain:
        description: "Domain to verify and add to the Workspace account"
        required: true
      admin_email:
        description: "Workspace Super Admin to impersonate"
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  add-domain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # GCP_PROJECT_ID, GCP_WORKLOAD_IDENTITY_PROVIDER, and WORKSPACE_SA_EMAIL
      # are repository Actions *variables* (Settings → Secrets and variables →
      # Actions → Variables) — see docs/setup/workspace-support-group.md.
      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run domain provisioning step
        run: node scripts/add-workspace-domain.ts "${{ inputs.command }}" "${{ inputs.domain }}" "${{ inputs.admin_email }}"
        env:
          WORKSPACE_SA_EMAIL: ${{ vars.WORKSPACE_SA_EMAIL }}
