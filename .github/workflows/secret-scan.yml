name: Secret scan

# Gitleaks over the full git history on every PR and push to main. This repo is
# public: a leaked credential or personal identifier is exposed the moment it's
# pushed, so catch it in CI before merge. Uses the OSS gitleaks binary directly
# (MIT) rather than gitleaks-action, so no license key is needed.

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks (full history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history — a secret in an old commit is still leaked

      - name: Run gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks git --no-banner --redact --exit-code 1 .
